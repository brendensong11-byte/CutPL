<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CutPL - 세라믹 도면 통합 계산기 (완벽 테트리스 밀착배치 버전)</title>
    <style>
        :root {
            --primary-color: #0052cc;
            --bg-color: #f4f6fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 { margin-top: 0; font-size: 1.3rem; color: #111; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        
        textarea { height: 120px; font-family: monospace; resize: vertical; }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
        }
        .btn:hover { background-color: #0040a3; }

        .info-box {
            background-color: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        /* 캔버스 스타일 스타일링 */
        .canvas-container {
            width: 100%;
            overflow-x: auto;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }
        canvas { background-color: #fafafa; }
    </style>
</head>
<body>

<div class="container">
    <!-- 왼쪽: 입력 및 설정 영역 -->
    <div class="card">
        <h2>도면 계산기 <span style="color:var(--primary-color); font-size:0.8rem;">(완벽 테트리스 빈틈 밀착배치)</span></h2>
        
        <div class="form-group">
            <label>사용할 원자재 규격</label>
            <select id="plateSize">
                <option value="3200x1600">기본 원판 (3200 × 1600)</option>
                <option value="2400x1200">중형 원판 (2400 × 1200)</option>
            </select>
        </div>

        <div class="info-box">
            💡 <strong>안내:</strong> 가로/세로 순서가 뒤바뀌어 입력되어도 알고리즘이 연속 재단 라인에 맞춰 <strong>가장 이쁘게 들어맞는 방향으로 자동 회전</strong>시킵니다.
        </div>

        <div class="form-group">
            <label>재단 치수 입력 (자유롭게 입력)</label>
            <textarea id="cutInputs" placeholder="예시 입력:&#10;600 400 - 1300 400 - 400 600&#10;600 450 - 500 450 - 600 450"></textarea>
        </div>

        <button class="btn" onclick="processCutting()">시뮬레이션 가동 및 배치하기</button>
    </div>

    <!-- 오른쪽: 실시간 도면 레이아웃 시뮬레이션 -->
    <div class="card">
        <h2>📊 실시간 재단 도면 레이아웃 (시뮬레이션)</h2>
        <div id="summaryText" style="margin-bottom:10px; font-weight:bold; color:#555;"></div>
        <div class="canvas-container">
            <canvas id="layoutCanvas" width="500" height="300"></canvas>
        </div>
    </div>
</div>

<script>
    // 페이지 로드 시 초기 예시 데이터 주입
    window.onload = function() {
        document.getElementById('cutInputs').value = "600 400 - 1300 400 - 400 600\n600 450 - 500 450 - 600 450";
        processCutting();
    };

    function processCutting() {
        // 1. 원판 사이즈 파악
        const plateSelect = document.getElementById('plateSize').value;
        const [plateW, plateH] = plateSelect.split('x').map(Number);

        // 2. 입력 데이터 파싱 (공백, 하이픈, 줄바꿈을 유연하게 처리)
        const rawText = document.getElementById('cutInputs').value;
        const regex = /(\d+)\s+(\d+)/g;
        let match;
        let rawItems = [];

        while ((match = regex.exec(rawText)) !== null) {
            rawItems.push({
                w: parseInt(match[1]),
                h: parseInt(match[2])
            });
        }

        if (rawItems.length === 0) {
            alert("올바른 치수를 입력해주세요. (예: 600 400)");
            return;
        }

        // 3. 자동 회전 및 밀착 테트리스 알고리즘 가동
        const placedItems = fitItemsLayout(rawItems, plateW, plateH);

        // 4. 화면 그리기 (캔버스)
        drawSimulation(placedItems, plateW, plateH);

        // 상단 요약 텍스트 출력
        document.getElementById('summaryText').innerText = `원판 크기: ${plateW}×${plateH} | 배치된 조각: ${placedItems.length}개 / 총 입력: ${rawItems.length}개`;
    }

    /**
     * [수정부분 2] 자동 회전 검증이 포함된 밀착형 공간 분할(테트리스) 알고리즘
     */
    function fitItemsLayout(rawItems, plateWidth, plateHeight) {
        let placedItems = [];
        // 초기에 원판 전체를 하나의 거대한 빈 공간 격자로 설정
        let spaces = [{ x: 0, y: 0, w: plateWidth, h: plateHeight }];

        // 면적이 큰 조각부터 정렬해서 넣으면 라인 컷 효율이 대폭 상승합니다.
        const sortedItems = [...rawItems].sort((a, b) => (b.w * b.h) - (a.w * a.h));

        for (let item of sortedItems) {
            let placed = false;

            for (let i = 0; i < spaces.length; i++) {
                let space = spaces[i];

                // 무조건 가로로 고정하는 대신, 두 방향 상태를 후보군으로 둠
                let orientations = [
                    { w: item.w, h: item.h, rotated: false }, // 원본 입력대로
                    { w: item.h, h: item.w, rotated: true }   // 90도 돌려서
                ];

                // 연속해서 쭉 자르기 편하도록 잔여 공간 매칭률이 우수한 방향을 우선 정렬
                orientations.sort((a, b) => {
                    let scoreA = Math.abs((space.w - a.w)) + Math.abs((space.h - a.h));
                    let scoreB = Math.abs((space.w - b.w)) + Math.abs((space.h - b.h));
                    return scoreA - scoreB;
                });

                // 두 방향 중 매칭 공간에 들어맞는 첫 번째 방향 선택
                for (let target of orientations) {
                    if (space.w >= target.w && space.h >= target.h) {
                        
                        // 적합한 위치에 안착
                        placedItems.push({
                            x: space.x,
                            y: space.y,
                            w: target.w,
                            h: target.h,
                            rotated: target.rotated
                        });

                        // 조각을 넣고 쪼개진 잔여 가로/세로 공간을 추적 리스트에 추가 (Gui Guillotine 분할)
                        if (space.w - target.w > 0) {
                            spaces.push({
                                x: space.x + target.w,
                                y: space.y,
                                w: space.w - target.w,
                                h: space.h
                            });
                        }
                        if (space.h - target.h > 0) {
                            spaces.push({
                                x: space.x,
                                y: space.y + target.h,
                                w: target.w,
                                h: space.h - target.h
                            });
                        }

                        spaces.splice(i, 1); // 사용한 빈 공간 도려내기
                        placed = true;
                        break;
                    }
                }
                if (placed) break;
            }
        }
        return placedItems;
    }

    /**
     * [수정부분 1] 원판 외곽선 라인을 먼저 그리고 그 내부에 재단면을 채워 그리는 함수
     */
    function drawSimulation(placedItems, plateW, plateH) {
        const canvas = document.getElementById('layoutCanvas');
        const ctx = canvas.getContext('2d');

        // 스케일 계산 (원판 3200이 캔버스 가로 500안에 적절한 마진을 두고 드로잉되도록)
        const margin = 30;
        const scaleX = (canvas.width - margin * 2) / plateW;
        const scaleY = (canvas.height - margin * 2) / plateH;
        const scale = Math.min(scaleX, scaleY);

        // 여백 중앙 정렬 원점 계산
        const offsetX = (canvas.width - plateW * scale) / 2;
        const offsetY = (canvas.height - plateH * scale) / 2;

        // 캔버스 초기 초기화
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // ──────────────────────────────────────────
        // [수정부분 1 핵심] 배경 원판 라인 시각화 (회색 점선 및 연한 음영 배경)
        // ──────────────────────────────────────────
        ctx.fillStyle = '#f8f9fa'; 
        ctx.fillRect(offsetX, offsetY, plateW * scale, plateH * scale);

        ctx.strokeStyle = '#a0aec0'; // 회색 경계선
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]); // 세련된 점선 스타일링
        ctx.strokeRect(offsetX, offsetY, plateW * scale, plateH * scale);
        ctx.setLineDash([]); // 점선 해제 (실제 재단선은 실선이어야 하므로)

        // 원판 좌측 상단 규격 안내 텍스트 라벨링
        ctx.fillStyle = '#a0aec0';
        ctx.font = '10px Arial';
        ctx.fillText(`원판 영역 (${plateW} × ${plateH})`, offsetX, offsetY - 8);

        // ──────────────────────────────────────────
        // 점선 외곽 라인 내부에 실제 사이즈 재단면 순회 드로잉
        // ──────────────────────────────────────────
        placedItems.forEach((item, index) => {
            const rx = offsetX + item.x * scale;
            const ry = offsetY + item.y * scale;
            const rw = item.w * scale;
            const rh = item.h * scale;

            // 재단 블록 색상 (오렌지 톤) 및 불투명 채우기
            ctx.fillStyle = '#e67e22';
            ctx.fillRect(rx, ry, rw, rh);

            // 가시성을 돕기 위한 실선 백색 테두리
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(rx, ry, rw, rh);

            // 중앙 텍스트 각인 (사이즈 + 자동 회전 마크 표기)
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 11px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // 텍스트 내용 조립
            let label = `${item.w}×${item.h}`;
            if (item.rotated) {
                label += " 🔄"; // 회전되어 정렬되었음을 심볼로 표기
            }

            // 아주 작은 조각이 아니라면 글씨 출력
            if (rw > 35 && rh > 15) {
                ctx.fillText(label, rx + rw / 2, ry + rh / 2);
            }
        });
    }
</script>

</body>
</html>
