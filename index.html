<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brenden - 도면 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-gray-800 min-h-screen py-8 px-4 flex justify-center items-start">

    <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100 max-w-lg w-full space-y-6">
        
        <!-- 타이틀 헤더 (요청하신 대로 수정) -->
        <div class="border-b border-gray-100 pb-4 text-center">
            <h1 class="text-xl font-extrabold text-gray-900 tracking-tight flex items-center justify-center gap-1">
                도면 계산기<span class="text-base font-normal text-blue-600"> (✨brenden 에디션)</span>
            </h1>
            <p class="text-xs text-gray-400 mt-1">원자재 크기 및 칼날 손실(3mm) 반영 자동 장수 계산</p>
        </div>

        <!-- ⚠️ [신규] 원자재(슬랩) 사이즈 선택 및 필요 장수 표시 -->
        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 space-y-3">
            <span class="text-xs font-bold text-blue-800 uppercase tracking-wider block">📦 원자재(슬랩) 소요량 계산기</span>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">사용할 원자재 규격 선택</label>
                <select id="slab_size" class="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="calculateAll()">
                    <option value="3600*1600">큰 사이즈 (3600 * 1600 mm)</option>
                    <option value="2700*1200">중간 사이즈 (2700 * 1200 mm)</option>
                </select>
            </div>

            <div class="flex justify-between items-center pt-2 border-t border-blue-200/60">
                <span class="text-sm font-bold text-gray-700">예상 필요 원자재 총 수량:</span>
                <span class="text-lg font-black text-blue-700"><span id="total_slabs">0</span> 장</span>
            </div>
            <p class="text-[11px] text-gray-500 leading-tight">※ 12T 및 6T 재단 치수에 입력된 원판 가공 치수(`길이*폭`)를 기반으로 계산됩니다. 재단 시 칼날 두께(3mm)로 소실되는 면적 및 기본 여유율이 자동 반영됩니다.</p>
        </div>

        <!-- 1. 12T 재단 치수 (입력 방식 안내 변경) -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">12T 재단 치수 입력 (mm 단위)</label>
            <textarea id="input_12t" class="w-full p-3 border border-gray-200 rounded-xl font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" rows="3" placeholder="예가공 치수를 '길이*폭' 형태로 적으세요.&#10;예: 2450*658&#10;여러 장이면 엔터 치고: 2485*890" oninput="calculateAll()"></textarea>
            <div class="text-xs text-right text-gray-500 mt-1">총 연장 길이: <span id="res_12t" class="font-bold text-blue-600">0</span> m</div>
        </div>

        <!-- 2. 6T 재단 치수 -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">6T 재단 치수 입력 (mm 단위)</label>
            <textarea id="input_6t" class="w-full p-3 border border-gray-200 rounded-xl font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" rows="3" placeholder="예: 1200*600 (엔터 치고 여러 장 가능)" oninput="calculateAll()"></textarea>
            <div class="text-xs text-right text-gray-500 mt-1">총 연장 길이: <span id="res_6t" class="font-bold text-blue-600">0</span> m</div>
        </div>

        <!-- 3. 고스라 치수 -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">고스라 (▲) 치수 입력 (mm 단위)</label>
            <textarea id="input_gosra" class="w-full p-3 border border-gray-200 rounded-xl font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" rows="2" placeholder="예: 2450 + 1200" oninput="calculateAll()"></textarea>
            <div class="text-xs text-right text-gray-500 mt-1">합계: <span id="res_gosra" class="font-bold text-blue-600">0</span> m</div>
        </div>

        <!-- 4. 배면연마 치수 -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">배면연마 (////) 치수 입력 (mm 단위)</label>
            <textarea id="input_back" class="w-full p-3 border border-gray-200 rounded-xl font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" rows="2" placeholder="도면의 mm 치수들을 적으세요" oninput="calculateAll()"></textarea>
            <div class="text-xs text-right text-gray-500 mt-1">합계: <span id="res_back" class="font-bold text-blue-600">0</span> m</div>
        </div>

        <!-- 5. 뒷도매 치수 -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">뒷도매 (〇〇)(졸리) 치수 입력 (mm 단위)</label>
            <textarea id="input_dome" class="w-full p-3 border border-gray-200 rounded-xl font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" rows="2" placeholder="도면의 mm 치수들을 적으세요" oninput="calculateAll()"></textarea>
            <div class="text-xs text-right text-gray-500 mt-1">합계: <span id="res_dome" class="font-bold text-blue-600">0</span> m</div>
        </div>

        <hr class="border-gray-100">

        <!-- 타공 및 수량 입력란 -->
        <div class="grid grid-cols-2 gap-4 text-sm">
            <div>
                <label class="block text-gray-600 mb-1">사선절개 수량 (개)</label>
                <input type="number" id="cnt_saseon" class="w-full p-2 border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
            </div>
            <div>
                <label class="block text-gray-600 mb-1">세면대타공 수량 (개)</label>
                <input type="number" id="cnt_basin" class="w-full p-2 border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
            </div>
            <div>
                <label class="block text-gray-600 mb-1">싱크타공 수량 (개)</label>
                <input type="number" id="cnt_sink" class="w-full p-2 border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
            </div>
            <div>
                <label class="block text-gray-600 mb-1">인덕션타공 수량 (개)</label>
                <input type="number" id="cnt_induction" class="w-full p-2 border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
            </div>
            <div>
                <label class="block text-gray-600 mb-1">수전타공 수량 (개)</label>
                <input type="number" id="cnt_water" class="w-full p-2 border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
            </div>
            <div>
                <label class="block text-gray-600 mb-1">콘센트타공 수량 (개)</label>
                <input type="number" id="cnt_outlet" class="w-full p-2 border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
            </div>
        </div>

        <!-- 최종 결과 표시창 -->
        <div class="bg-slate-950 text-white p-5 rounded-2xl flex justify-between items-center shadow-inner">
            <div class="space-y-0.5">
                <span class="text-xs text-gray-400 font-medium block">최종 단가</span>
                <span id="totalPrice" class="text-2xl font-black text-red-400">0 원</span>
            </div>
            <button onclick="resetForm()" class="bg-white/10 hover:bg-white/20 text-white text-xs px-3 py-2 rounded-lg font-bold transition-all">초기화</button>
        </div>

    </div>

    <script>
        // 기존 단순 모든 숫자 합산 함수 (고스라, 배면연마, 뒷도매용)
        function parseAndSumToMeters(text) {
            if (!text) return 0;
            const numbers = text.match(/\d+/g);
            if (!numbers) return 0;
            const sumMm = numbers.reduce((acc, num) => acc + parseInt(num), 0);
            return (sumMm / 1000).toFixed(2);
        }

        // 💡 [신규 핵심] 재단 창에서 원판 면적(헤베) 및 칼날 손실을 계산하는 함수
        function calculateCuttingAreaAndLength(text) {
            let totalAreaM2 = 0;
            let totalLengthM = 0;
            if (!text) return { area: 0, length: 0 };

            // 줄바꿈이나 기호 기준으로 행 분할
            const lines = text.split(/[\n,;+]+/);
            
            lines.forEach(line => {
                // 한 줄에서 숫자 2개(가로*세로)를 찾아냄
                const parts = line.match(/\d+/g);
                if (parts && parts.length >= 2) {
                    const w = parseInt(parts[0]); // 가로(mm)
                    const h = parseInt(parts[1]); // 세로(mm)
                    
                    // ✂️ 칼날 자국 손실 계산: 잘라낼 때 사방으로 3mm씩 손실되므로 자재 소모량 관점에서는 가로세로에 3mm씩 더해줍니다.
                    const effectiveW = w + 3;
                    const effectiveH = h + 3;

                    // 헤베(m²)로 환산하여 누적
                    totalAreaM2 += (effectiveW * effectiveH) / 1000000;
                    // 테두리 길이 연장선도 단가 계산을 위해 누적
                    totalLengthM += (w + h) / 1000;
                } else if (parts && parts.length === 1) {
                    // 가로*세로가 아니라 숫자 하나만 적었을 경우 길이로만 취급
                    totalLengthM += parseInt(parts[0]) / 1000;
                }
            });

            return { area: totalAreaM2, length: totalLengthM.toFixed(2) };
        }

        function calculateAll() {
            // 12T와 6T는 면적과 연장 길이를 모두 구함
            const data12t = calculateCuttingAreaAndLength(document.getElementById('input_12t').value);
            const data6t = calculateCuttingAreaAndLength(document.getElementById('input_6t').value);

            // 단순 합산 항목들
            const mGosra = parseAndSumToMeters(document.getElementById('input_gosra').value);
            const mBack = parseAndSumToMeters(document.getElementById('input_back').value);
            const mDome = parseAndSumToMeters(document.getElementById('input_dome').value);

            // 화면에 길이 미터수 업데이트
            document.getElementById('res_12t').textContent = data12t.length;
            document.getElementById('res_6t').textContent = data6t.length;
            document.getElementById('res_gosra').textContent = mGosra;
            document.getElementById('res_back').textContent = mBack;
            document.getElementById('res_dome').textContent = mDome;

            // 📦 원자재 장수 계산 시스템
            const selectedSlab = document.getElementById('slab_size').value;
            let slabWidth = 3600;
            let slabHeight = 1600;
            
            if (selectedSlab === "2700*1200") {
                slabWidth = 2700;
                slabHeight = 1200;
            }

            // 원판 1장의 순수 면적(헤베)
            const slabArea = (slabWidth * slabHeight) / 1000000;
            
            // 사용자가 입력한 총 가공 면적 (12T 면적 + 6T 면적)
            const requiredArea = data12t.area + data6t.area;

            let neededSlabs = 0;
            if (requiredArea > 0) {
                // 자투리 버려지는 부분 및 재단 여유율(약 15%)을 보정하여 장수 계산
                neededSlabs = Math.ceil(requiredArea / (slabArea * 0.85));
            }
            document.getElementById('total_slabs').textContent = neededSlabs;

            // --- 💡 최종 금액 단가 수식 (필요시 반영) ---
            let finalPrice = 0;
            document.getElementById('totalPrice').textContent = finalPrice.toLocaleString() + ' 원';
        }

        function resetForm() {
            document.getElementById('input_12t').value = '';
            document.getElementById('input_6t').value = '';
            document.getElementById('input_gosra').value = '';
            document.getElementById('input_back').value = '';
            document.getElementById('input_dome').value = '';
            document.getElementById('cnt_saseon').value = 0;
            document.getElementById('cnt_basin').value = 0;
            document.getElementById('cnt_sink').value = 0;
            document.getElementById('cnt_induction').value = 0;
            document.getElementById('cnt_water').value = 0;
            document.getElementById('cnt_outlet').value = 0;
            calculateAll();
        }
    </script>
</body>
</html>
