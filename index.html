<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> - 도면 통합 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 text-gray-800 min-h-screen py-8 px-4 flex justify-center items-start">

    <!-- 왼쪽(기록장)과 오른쪽(입력창)을 나란히 배치하기 위한 큰 틀 -->
    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- 📋 [왼쪽 영역] 한 현장 누적 기록장 (전체 화면의 5칸 차지) -->
        <div class="lg:col-span-5 bg-white p-5 rounded-2xl shadow-xl border border-gray-200/60 flex flex-col h-full min-h-[600px]">
            <div class="border-b pb-3 mb-4">
                <h2 class="text-lg font-bold text-slate-900 flex items-center gap-1">
                    📋 현장 누적 기록장 <span class="text-xs font-normal text-gray-400">(여러 자재 합산)</span>
                </h2>
                <p class="text-[11px] text-gray-400 mt-0.5">우측에서 입력 후 '품목 저장하기'를 누르면 여기에 쌓입니다.</p>
            </div>

            <!-- 저장된 품목들이 나타나는 스크롤 상자 -->
            <div id="saved_list" class="space-y-3 flex-1 overflow-y-auto max-h-[550px] pr-1">
                <!-- 품목이 없을 때 보여주는 메시지 -->
                <p id="empty_msg" class="text-sm text-gray-400 text-center py-12">저장된 품목이 없습니다.<br>우측에서 계산 후 저장해 주세요.</p>
            </div>

            <!-- 💰 왼쪽 맨 아래: 현장 전체 최종 합계 창 -->
            <div class="mt-4 pt-4 border-t border-gray-200 bg-slate-900 text-white p-4 rounded-xl space-y-2 shadow-inner">
                <span class="text-xs font-bold text-amber-400 uppercase tracking-wider block">🏢 현장 총 합계 (누적)</span>
                <div class="grid grid-cols-2 gap-y-1 text-xs text-gray-300">
                    <div>총 원자재(슬랩): <span id="grand_slabs" class="font-bold text-white text-sm">0</span> 장</div>
                    <div>총 재단 길이: <span id="grand_length" class="font-bold text-white text-sm">0</span> m</div>
                    <div>고스라 합계: <span id="grand_gosra" class="font-bold text-white text-sm">0</span> m</div>
                    <div>뒷도매 합계: <span id="grand_dome" class="font-bold text-white text-sm">0</span> m</div>
                </div>
                <div class="flex justify-between items-center pt-2 border-t border-slate-700 mt-1">
                    <span class="text-sm font-bold">현장 총 결제 단가:</span>
                    <span id="grand_price" class="text-xl font-black text-amber-400">0 원</span>
                </div>
            </div>
        </div>

        <!-- ✍️ [오른쪽 영역] 현재 자재 계산 및 입력창 (전체 화면의 7칸 차지) -->
        <div class="lg:col-span-7 bg-white p-6 rounded-2xl shadow-xl border border-gray-100 space-y-5">
            
            <!-- 타이틀 -->
            <div class="border-b border-gray-100 pb-3 text-center">
                <h1 class="text-xl font-extrabold text-gray-900 tracking-tight">
                    도면 계산기<span class="text-blue-600 font-normal text-base"> (✨brenden 에디션)</span>
                </h1>
            </div>

            <!-- 현재 계산할 자재 정보 입력 -->
            <div class="grid grid-cols-2 gap-3 bg-slate-50 p-3 rounded-xl border border-slate-200/60">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">두께 및 자재명 (구분용)</label>
                    <input type="text" id="item_name" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="예: 12T 화이트">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">사용할 원자재 규격</label>
                    <select id="slab_size" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="calculateAll()">
                        <option value="3600*1600">큰 규격 (3600 * 1600)</option>
                        <option value="2700*1200">중간 규격 (2700 * 1200)</option>
                    </select>
                </div>
            </div>

            <!-- 현재 자재 예상 소요 장수 -->
            <div class="bg-blue-50/70 p-3 rounded-xl border border-blue-100 flex justify-between items-center text-sm">
                <span class="font-bold text-gray-700">현재 자재 필요 원판 수량:</span>
                <span class="text-base font-black text-blue-700"><span id="total_slabs">0</span> 장</span>
            </div>

            <!-- 1. 재단 치수 입력 상자 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">재단 치수 입력 (mm 단위)</label>
                <textarea id="input_cut" class="w-full p-3 border border-gray-200 rounded-xl font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" rows="3" placeholder="예: 2450*860 (엔터 치고 여러 장 적으세요)" oninput="calculateAll()"></textarea>
                <div class="text-xs text-right text-gray-500 mt-1">현재 재단 총 길이: <span id="res_cut" class="font-bold text-blue-600">0</span> m</div>
            </div>

            <!-- 2. 가공 치수들 (아이콘 및 명칭 보완) -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">고스라 🔺 치수 (mm)</label>
                    <textarea id="input_gosra" class="w-full p-2 border border-gray-200 rounded-lg font-mono text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" rows="2" placeholder="예: 2450+1200" oninput="calculateAll()"></textarea>
                    <div class="text-[11px] text-right text-gray-500 mt-0.5">합계: <span id="res_gosra" class="font-bold text-blue-600">0</span> m</div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">배면연마 //// 치수 (mm)</label>
                    <textarea id="input_back" class="w-full p-2 border border-gray-200 rounded-lg font-mono text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" rows="2" placeholder="예: 1800+600" oninput="calculateAll()"></textarea>
                    <div class="text-[11px] text-right text-gray-500 mt-0.5">합계: <span id="res_back" class="font-bold text-blue-600">0</span> m</div>
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-700 mb-1">뒷도매(졸리) 〇〇 치수 (mm)</label>
                    <textarea id="input_dome" class="w-full p-2 border border-gray-200 rounded-lg font-mono text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" rows="2" placeholder="도면의 뒷도매 mm 치수 입력" oninput="calculateAll()"></textarea>
                    <div class="text-[11px] text-right text-gray-500 mt-0.5">합계: <span id="res_dome" class="font-bold text-blue-600">0</span> m</div>
                </div>
            </div>

            <!-- 3. 타공 및 특수가공 수량 입력칸 (요청하신 목록 전체 반영) -->
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 space-y-3">
                <span class="text-xs font-bold text-gray-600 tracking-wider block">🛠️ 타공 및 가공 수량 입력</span>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-xs">
                    <div>
                        <label class="block text-gray-500 mb-1 font-medium">세면대타공 (개)</label>
                        <input type="number" id="cnt_basin" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1 font-medium">싱크타공 (개)</label>
                        <input type="number" id="cnt_sink" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1 font-medium">수전타공 (개)</label>
                        <input type="number" id="cnt_water" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1 font-medium">인덕션타공 (개)</label>
                        <input type="number" id="cnt_induction" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1 font-medium">콘센트타공 (개)</label>
                        <input type="number" id="cnt_outlet" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1 font-medium">사선절개 (개)</label>
                        <input type="number" id="cnt_saseon" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-gray-500 mb-1 font-medium">따내기 (개)</label>
                        <input type="number" id="cnt_ttanaegi" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-center" value="0" oninput="calculateAll()">
                    </div>
                </div>
            </div>

            <!-- 💰 현재 입력중인 품목의 가공 비용 입력 영역 -->
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-2">
                <label class="block text-xs font-bold text-gray-700">현재 자재의 단가 직접 입력 (조정창)</label>
                <div class="flex gap-2">
                    <input type="number" id="unit_price" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm font-mono" value="0" oninput="calculateAll()" placeholder="금액 입력">
                    <span class="flex items-center text-sm font-bold text-gray-500">원</span>
                </div>
                <div class="flex justify-between items-center text-sm pt-2 border-t border-dashed border-gray-200">
                    <span class="font-bold text-gray-800">현재 품목 최종가:</span>
                    <span id="totalPrice" class="text-base font-extrabold text-red-500">0 원</span>
                </div>
            </div>

            <!-- 🚀 기록장 전송 및 초기화 버튼 -->
            <div class="grid grid-cols-3 gap-3">
                <button onclick="resetCurrentForm()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs py-3 rounded-xl font-bold transition-all">이 칸 비우기</button>
                <button onclick="saveItemToLeft()" class="col-span-2 bg-blue-600 hover:bg-blue-700 text-white text-xs py-3 rounded-xl font-bold transition-all shadow-md shadow-blue-200">← 위 내용을 왼쪽에 저장하기</button>
            </div>

        </div>
    </div>

    <script>
        let globalSavedItems = [];

        function parseAndSumToMeters(text) {
            if (!text) return 0;
            const numbers = text.match(/\d+/g);
            if (!numbers) return 0;
            const sumMm = numbers.reduce((acc, num) => acc + parseInt(num), 0);
            return (sumMm / 1000).toFixed(2);
        }

        function calculateCuttingAreaAndLength(text) {
            let totalAreaM2 = 0;
            let totalLengthM = 0;
            if (!text) return { area: 0, length: 0 };

            const lines = text.split(/[\n,;+]+/);
            lines.forEach(line => {
                const parts = line.match(/\d+/g);
                if (parts && parts.length >= 2) {
                    const w = parseInt(parts[0]);
                    const h = parseInt(parts[1]);
                    const effectiveW = w + 3; // 3mm 칼날 손실 반영
                    const effectiveH = h + 3;
                    totalAreaM2 += (effectiveW * effectiveH) / 1000000;
                    totalLengthM += (w + h) / 1000;
                } else if (parts && parts.length === 1) {
                    totalLengthM += parseInt(parts[0]) / 1000;
                }
            });
            return { area: totalAreaM2, length: parseFloat(totalLengthM.toFixed(2)) };
        }

        function calculateAll() {
            const dataCut = calculateCuttingAreaAndLength(document.getElementById('input_cut').value);
            const mGosra = parseFloat(parseAndSumToMeters(document.getElementById('input_gosra').value));
            const mBack = parseFloat(parseAndSumToMeters(document.getElementById('input_back').value));
            const mDome = parseFloat(parseAndSumToMeters(document.getElementById('input_dome').value));

            document.getElementById('res_cut').textContent = dataCut.length;
            document.getElementById('res_gosra').textContent = mGosra;
            document.getElementById('res_back').textContent = mBack;
            document.getElementById('res_dome').textContent = mDome;

            // 원판 장수 계산
            const selectedSlab = document.getElementById('slab_size').value;
            let slabW = 3600, slabH = 1600;
            if (selectedSlab === "2700*1200") { slabW = 2700; slabH = 1200; }
            const slabArea = (slabW * slabH) / 1000000;

            let neededSlabs = 0;
            if (dataCut.area > 0) {
                neededSlabs = Math.ceil(dataCut.area / (slabArea * 0.85));
            }
            document.getElementById('total_slabs').textContent = neededSlabs;

            // 단가 입력값 연동
            const unitPrice = parseInt(document.getElementById('unit_price').value) || 0;
            document.getElementById('totalPrice').textContent = unitPrice.toLocaleString() + ' 원';
        }

        function saveItemToLeft() {
            const itemName = document.getElementById('item_name').value.trim() || "미지정 자재";
            const slabs = parseInt(document.getElementById('total_slabs').textContent) || 0;
            const cutLen = parseFloat(document.getElementById('res_cut').textContent) || 0;
            const gosraLen = parseFloat(document.getElementById('res_gosra').textContent) || 0;
            const backLen = parseFloat(document.getElementById('res_back').textContent) || 0;
            const domeLen = parseFloat(document.getElementById('res_dome').textContent) || 0;
            const price = parseInt(document.getElementById('unit_price').value) || 0;

            // 타공 수량 객체 저장
            const tBasin = parseInt(document.getElementById('cnt_basin').value) || 0;
            const tSink = parseInt(document.getElementById('cnt_sink').value) || 0;
            const tWater = parseInt(document.getElementById('cnt_water').value) || 0;
            const tInduction = parseInt(document.getElementById('cnt_induction').value) || 0;
            const tOutlet = parseInt(document.getElementById('cnt_outlet').value) || 0;
            const tSaseon = parseInt(document.getElementById('cnt_saseon').value) || 0;
            const tTtanaegi = parseInt(document.getElementById('cnt_ttanaegi').value) || 0;

            if(slabs === 0 && cutLen === 0 && price === 0 && tBasin === 0 && tSink === 0) {
                alert("입력된 수치가 없어 저장할 수 없습니다.");
                return;
            }

            globalSavedItems.push({
                id: Date.now(),
                name: itemName,
                slabs: slabs,
                cutLen: cutLen,
                gosraLen: gosraLen,
                backLen: backLen,
                domeLen: domeLen,
                price: price,
                tagong: { basin: tBasin, sink: tSink, water: tWater, induction: tInduction, outlet: tOutlet, saseon: tSaseon, ttanaegi: tTtanaegi }
            });

            updateLeftListUI();
            resetCurrentForm();
        }

        function updateLeftListUI() {
            const listEl = document.getElementById('saved_list');
            const emptyEl = document.getElementById('empty_msg');
            listEl.innerHTML = '';

            if (globalSavedItems.length === 0) {
                emptyEl.style.display = 'block';
                listEl.appendChild(emptyEl);
                document.getElementById('grand_slabs').textContent = 0;
                document.getElementById('grand_length').textContent = 0;
                document.getElementById('grand_gosra').textContent = 0;
                document.getElementById('grand_dome').textContent = 0;
                document.getElementById('grand_price').textContent = "0 원";
                return;
            }

            emptyEl.style.display = 'none';
            let totalSlabs = 0, totalCut = 0, totalGosra = 0, totalDome = 0, totalPrice = 0;

            globalSavedItems.forEach(item => {
                totalSlabs += item.slabs;
                totalCut += item.cutLen;
                totalGosra += item.gosraLen;
                totalDome += item.domeLen;
                totalPrice += item.price;

                // 타공이 설정된 경우에만 텍스트 노출
                let tagongText = [];
                if(item.tagong.basin > 0) tagongText.push(`세면대 ${item.tagong.basin}개`);
                if(item.tagong.sink > 0) tagongText.push(`싱크 ${item.tagong.sink}개`);
                if(item.tagong.water > 0) tagongText.push(`수전 ${item.tagong.water}개`);
                if(item.tagong.induction > 0) tagongText.push(`인덕션 ${item.tagong.induction}개`);
                if(item.tagong.outlet > 0) tagongText.push(`콘센트 ${item.tagong.outlet}개`);
                if(item.tagong.saseon > 0) tagongText.push(`사선 ${item.tagong.saseon}개`);
                if(item.tagong.ttanaegi > 0) tagongText.push(`따내기 ${item.tagong.ttanaegi}개`);
                
                const tagongLine = tagongText.length > 0 ? `<div class="text-[11px] text-blue-600 font-medium">• 타공: ${tagongText.join(', ')}</div>` : '';

                const card = document.createElement('div');
                card.className = "bg-slate-50 p-3 rounded-xl border border-gray-200 relative text-xs space-y-1";
                card.innerHTML = `
                    <div class="flex justify-between items-center font-bold text-sm text-slate-800">
                        <span>📌 ${item.name}</span>
                        <button onclick="deleteItem(${item.id})" class="text-red-500 font-normal text-xs hover:underline">삭제</button>
                    </div>
                    <div class="text-gray-600 grid grid-cols-2 gap-x-2 gap-y-0.5 font-mono">
                        <div>• 원판수량: <span class="text-blue-600 font-bold">${item.slabs}</span> 장</div>
                        <div>• 재단길이: <span class="text-slate-700 font-bold">${item.cutLen}</span> m</div>
                        <div>• 고스라🔺: <span class="text-slate-700 font-bold">${item.gosraLen}</span> m</div>
                        <div>• 배면////: <span class="text-slate-700 font-bold">${item.backLen}</span> m</div>
                        <div class="col-span-2">• 뒷도매〇〇: <span class="text-slate-700 font-bold">${item.domeLen}</span> m</div>
                    </div>
                    ${tagongLine}
                    <div class="text-right border-t border-gray-200/60 pt-1 mt-1 font-bold text-slate-900">
                        단가: <span class="text-red-500">${item.price.toLocaleString()}</span> 원
                    </div>
                `;
                listEl.appendChild(card);
            });

            document.getElementById('grand_slabs').textContent = totalSlabs;
            document.getElementById('grand_length').textContent = totalCut.toFixed(2);
            document.getElementById('grand_gosra').textContent = totalGosra.toFixed(2);
            document.getElementById('grand_dome').textContent = totalDome.toFixed(2);
            document.getElementById('grand_price').textContent = totalPrice.toLocaleString() + " 원";
        }

        function deleteItem(id) {
            globalSavedItems = globalSavedItems.filter(item => item.id !== id);
            updateLeftListUI();
        }

        function resetCurrentForm() {
            document.getElementById('item_name').value = '';
            document.getElementById('input_cut').value = '';
            document.getElementById('input_gosra').value = '';
            document.getElementById('input_back').value = '';
            document.getElementById('input_dome').value = '';
            document.getElementById('cnt_basin').value = 0;
            document.getElementById('cnt_sink').value = 0;
            document.getElementById('cnt_water').value = 0;
            document.getElementById('cnt_induction').value = 0;
            document.getElementById('cnt_outlet').value = 0;
            document.getElementById('cnt_saseon').value = 0;
            document.getElementById('cnt_ttanaegi').value = 0;
            document.getElementById('unit_price').value = 0;
            calculateAll();
        }

        calculateAll();
    </script>
</body>
</html>
